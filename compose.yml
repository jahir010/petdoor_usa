networks:
  outdoorda_net:
    driver: bridge

services:
  api:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    image: ${IMAGE_NAMESPACE:-moynul2k3}/outdoorda-backend:${IMAGE_TAG:-latest}
    container_name: outdoorda_api
    ports:
      - "9920:8000"
    env_file:
      - .env
    volumes:
      - ./media:/app/media
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/ > /dev/null || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5

    networks:
      - outdoorda_net
